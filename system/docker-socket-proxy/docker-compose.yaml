# Docker Socket Proxy — claude-home-server
#
# Wraps /var/run/docker.sock behind a minimal HTTP proxy so the MCP server
# never touches the raw socket directly. Only the explicitly-listed endpoints
# are enabled; every other Docker API route returns 403 by default.
#
# Installation:
#   docker compose -f system/docker-socket-proxy/docker-compose.yaml up -d
#
# The proxy listens on 127.0.0.1:2375 only. Nothing outside localhost can
# reach it. Set DOCKER_HOST=tcp://127.0.0.1:2375 in the MCP server environment.

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped

    # Never expose 2375 on the external interface — bind to loopback only.
    ports:
      - "127.0.0.1:2375:2375"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Harden the container itself.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    environment:
      # --- Allowed endpoints ---
      # Container lifecycle: list, inspect, start, stop, restart
      CONTAINERS: 1
      # Image list and inspect (no pull, no build, no push)
      IMAGES: 1
      # Network topology read-access
      NETWORKS: 1
      # Volume list and inspect
      VOLUMES: 1
      # Engine info (/info) and version (/version)
      INFO: 1
      VERSION: 1
      # POST is required for start/stop/restart actions on containers.
      # Even with POST=1, only the above-enabled resource routes are reachable.
      POST: 1

      # --- Explicitly disabled endpoints ---
      # Disable everything that could modify the host at the infrastructure level.
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
